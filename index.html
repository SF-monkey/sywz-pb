                <option value="14">长篇史诗版（14句）</option>
            </select>
        </div>

        <div class="row">
            <label>配音音色选择</label>

                <optgroup label="—— 微软 Edge TTS ——">

                    <option value="edge|zh-CN-YunhaoNeural">云皓·豪迈男声</option>
                    <option value="edge|zh-CN-YunjianNeural">云健·稳重男声</option>

                    <option value="edge|zh-CN-XiaoyiNeural">晓伊·甜美女声</option>
                </optgroup>
                <optgroup label="—— 曼波 AI 配音（限300字）——">
                    <option value="mibo">曼波AI配音</option>
                </optgroup>
            </select>
            <div class="notice" id="voiceNotice"></div>
        </div>

        <!-- 微软Edge TTS 语速 -->
        <div class="row" id="edgeRateSection">
            <label>朗读语速</label>
            <select id="rateSel">
                <option value="0.85">缓慢深情</option>
                <option value="1.0" selected>标准旁白</option>
                <option value="1.15">稍快激昂</option>
                <option value="1.3">铿锵有力</option>
            </select>
        </div>

        <div class="btn-group">
            <button onclick="generateRandomText()">随机生成文案</button>

            <button onclick="copyText()">复制文案</button>
        </div>

        <div class="result" id="resultBox">
            输入名字生成

        <div class="char-count" id="charCount"></div>
        <div class="tip" id="tipText">配音基于微软Edge神经网络语音</div>
    </div>

        // ═══════════════════════════════════════════

        function shuffleArr(arr) {
            let newArr = [...arr];
            for(let i = newArr.length - 1; i > 0; i--){
                let j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function formatALine(name, aStr){
            if(Math.random() > 0.5){
                return name + aStr;
            } else {
                return "他" + aStr.replace(/^，/, '');
            }
        }

            }

            const selectedVoice = document.getElementById("voiceSel").value;
            const platform = selectedVoice.startsWith('mibo') ? 'mibo' : 'edge';
            const totalLen = parseInt(document.getElementById("lenSel").value);

            // 曼波平台检查：14句超限
            if(platform === 'mibo' && totalLen > 9){
                alert("曼波AI配音最多只能生成9句文案，请调整文案长度！");
                return;
            }

            let poolA = shuffleArr([...namePrefixLib]);
            let poolB = shuffleArr([...pureElegantLib]);

            let res = [];
            let lastIsB = false;
            let skipCount = 0;
            const MAX_SKIP = 10;

            while(res.length < totalLen && skipCount < MAX_SKIP){
                if(lastIsB){
                    let aItem = poolA.pop() || namePrefixLib[Math.floor(Math.random() * namePrefixLib.length)];
                    if(isOverpoweredTragic(aItem) && Math.random() < 0.5){
                        poolA.push(aItem);
                        poolA = shuffleArr(poolA);
                        skipCount++;
                        continue;
                    }
                    skipCount = 0;
                    res.push(formatALine(name, aItem));
                    lastIsB = false;
                } else {
                    let rand = Math.random();
                    if(rand < 0.35){
                        let bItem = poolB.pop() || pureElegantLib[Math.floor(Math.random() * pureElegantLib.length)];
                        if(isOverpoweredTragic(bItem) && Math.random() < 0.5){
                            poolB.push(bItem);
                            poolB = shuffleArr(poolB);
                            skipCount++;
                            continue;
                        }
                        skipCount = 0;
                        res.push(bItem);
                        lastIsB = true;
                    } else {
                        let aItem = poolA.pop() || namePrefixLib[Math.floor(Math.random() * namePrefixLib.length)];
                        if(isOverpoweredTragic(aItem) && Math.random() < 0.5){
                            poolA.push(aItem);
                            poolA = shuffleArr(poolA);
                            skipCount++;
                            continue;
                        }
                        skipCount = 0;
                        res.push(formatALine(name, aItem));
                        lastIsB = false;
                    }
                }
                if(poolA.length === 0) poolA = shuffleArr([...namePrefixLib]);
                if(poolB.length === 0) poolB = shuffleArr([...pureElegantLib]);
            }

            finalText = res.join("\n");
            document.getElementById("resultBox").innerText = finalText;

            // 更新字数统计
            updateCharCount();
        }

        // ═══════════════════════════════════════════
        //  字数统计
        // ═══════════════════════════════════════════

        function updateCharCount(){
            const charCountEl = document.getElementById('charCount');
            const len = finalText.length;
            if(!finalText){
                charCountEl.textContent = '';
                charCountEl.className = 'char-count';
                return;
            }

            const selectedVoice = document.getElementById("voiceSel").value;
            const platform = selectedVoice.startsWith('mibo') ? 'mibo' : 'edge';

            charCountEl.textContent = `当前文案字数：${len}字`;

            if(platform === 'mibo'){
                if(len > MIBO_MAX_CHARS){
                    charCountEl.textContent += `（超过曼波限制${MIBO_MAX_CHARS}字，请减少文案长度）`;
                    charCountEl.className = 'char-count warning';
                } else {
                    charCountEl.textContent += `（曼波限制${MIBO_MAX_CHARS}字，剩余${MIBO_MAX_CHARS - len}字）`;
                    charCountEl.className = 'char-count ok';
                }
            } else {
                charCountEl.className = 'char-count';
            }
        }

        // ═══════════════════════════════════════════
        //  音色/长度切换事件
        // ═══════════════════════════════════════════

        function onVoiceChange(){
            const selectedVoice = document.getElementById("voiceSel").value;
            const platform = selectedVoice.startsWith('mibo') ? 'mibo' : 'edge';
            const lenSel = document.getElementById("lenSel");
            const notice = document.getElementById('voiceNotice');

            // 切换语速控件（曼波不支持语速调节）
            document.getElementById('edgeRateSection').style.display = platform === 'edge' ? 'block' : 'none';

            // 更新提示
            const tipText = document.getElementById('tipText');
            if(platform === 'mibo'){
                tipText.textContent = '曼波AI配音（不支持语速调节）';
                notice.textContent = '⚠️ 曼波AI配音字数限制300字，14句版本不可用，且不支持语速调节';
                notice.style.display = 'block';
            } else {
                tipText.textContent = '配音基于微软Edge神经网络语音';
                notice.textContent = '';
                notice.style.display = 'none';
            }

            // 更新长度选择
            if(platform === 'mibo'){
                // 禁用14句选项
                for(let i = 0; i < lenSel.options.length; i++){
                    if(lenSel.options[i].value === '14'){
                        lenSel.options[i].disabled = true;
                    } else {
                        lenSel.options[i].disabled = false;
                    }
                }
                // 如果当前选中14句，自动切换到9句
                if(lenSel.value === '14'){
                    lenSel.value = '9';
                }
            } else {
                // 恢复所有选项
                for(let i = 0; i < lenSel.options.length; i++){
                    lenSel.options[i].disabled = false;
                }
            }

            // 更新字数统计
            updateCharCount();
        }

        function onLenChange(){
            // 更新字数统计
            updateCharCount();
        }

        // ═══════════════════════════════════════════
        //  AI配音朗读 - 统一入口
        // ═══════════════════════════════════════════

        function setButtonLoading(btn, loading, customText) {
            if (loading) {
                btn.disabled = true;
                btn.dataset.originalText = btn.innerText;
                btn.innerText = customText || "AI正在生成...";
            } else {
                btn.disabled = false;
                btn.innerText = btn.dataset.originalText || "一键AI配音朗读";
            }
        }

        async function readVoice() {
            if (!finalText) {
                alert("请先生成专属文案！");
                return;
            }
            if (isGenerating) return;
            isGenerating = true;

            const btn = document.getElementById("voiceBtn");
            setButtonLoading(btn, true, "AI正在生成...");

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            try {
                const selectedVoice = document.getElementById("voiceSel").value;
                const platform = selectedVoice.startsWith('mibo') ? 'mibo' : 'edge';

                if(platform === 'mibo'){
                    await readVoiceMibo();
                } else {
                    await readVoiceEdge();
                }
            } catch (error) {
                console.error("配音生成失败:", error);
                // 不弹窗，由各平台函数自行处理
            } finally {
                isGenerating = false;
                setButtonLoading(btn, false);
            }
        }

        // ═══════════════════════════════════════════
        //  Edge TTS AI配音
        // ═══════════════════════════════════════════

        async function readVoiceEdge() {
            const selectedVoice = document.getElementById("voiceSel").value;
            const voiceId = selectedVoice.split('|')[1];
            const speed = parseFloat(document.getElementById("rateSel").value);

            try {
                const response = await fetch(TTS_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        input: finalText,
                        voice: voiceId,
                        speed: speed,
                        pitch: "0",
                        style: "general"
                    })
                });

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);

                currentAudio = new Audio(audioUrl);
                currentAudio.play().catch(err => {
                    console.error("播放失败:", err);
                    alert("音频播放失败，请检查浏览器设置");
                });

                currentAudio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                };

            } catch (error) {
                console.error("Edge TTS生成失败:", error);
                fallbackToBrowserTTS();
            }
        }

        function fallbackToBrowserTTS() {
            window.speechSynthesis.cancel();
            const selectedVoice = document.getElementById("voiceSel").value;
            const voiceType = selectedVoice.split('|')[1];

            let utter = new SpeechSynthesisUtterance(finalText);
            utter.lang = 'zh-CN';
            utter.rate = parseFloat(document.getElementById("rateSel").value);

            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                const voiceMap = {
                    'zh-CN-YunhaoNeural': ['男', '云'],
                    'zh-CN-YunjianNeural': ['男', '健'],
                    'zh-CN-YunzeNeural': ['男', '泽'],
                    'zh-CN-XiaozhenNeural': ['女', '甄'],
                    'zh-CN-XiaoqiuNeural': ['女', '秋'],
                    'zh-CN-XiaoyiNeural': ['女', '伊']
                };
                const keywords = voiceMap[voiceType] || [];
                utter.voice = voices.find(v => keywords.some(k => v.name.includes(k))) || voices[0];
            }
            window.speechSynthesis.speak(utter);
        }

        // ═══════════════════════════════════════════
        //  曼波AI配音
        // ═══════════════════════════════════════════

        async function readVoiceMibo() {
            // 检查字数限制
            if(finalText.length > MIBO_MAX_CHARS){
                alert(`曼波AI配音字数不能超过${MIBO_MAX_CHARS}字，当前${finalText.length}字，请减少文案长度！`);
                throw new Error('字数超限');
            }

            // 将换行符替换为逗号
            const textForApi = finalText.replace(/\n/g, '，');

            try {
                // 构建API URL（GET请求）
                const apiUrl = `${MIBO_API_URL}?text=${encodeURIComponent(textForApi)}`;

                console.log('曼波API请求URL:', apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }

                const data = await response.json();
                console.log('曼波API返回数据:', data);

                if(data.code !== 200 || !data.url){
                    throw new Error(data.msg || 'API返回数据格式错误');
                }

                // 播放音频
                currentAudio = new Audio(data.url);
                await currentAudio.play();

            } catch (error) {
                console.error("曼波TTS生成失败:", error);
                alert(`曼波AI配音生成失败：${error.message}\n\n可能原因：\n1. 网络连接问题\n2. API服务临时不可用\n3. 字数超出限制`);
                throw error;
            }
        }

        // ═══════════════════════════════════════════
        //  复制文案
        // ═══════════════════════════════════════════

        function copyText(){
            if(!finalText){
                alert("请先生成专属文案！");
                return;
            }
            navigator.clipboard.writeText(finalText).then(()=>{
                alert("✅ 文案已复制成功！");
            })
        }

        window.speechSynthesis.onvoiceschanged = function(){
            window.speechSynthesis.getVoices();
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function(){
            onVoiceChange();
        });
    </script>
</body>
